<style>
  /* 使用系统字体以确保微信兼容性 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f;
    --card: #13131c;
    --border: #1e1e2e;
    --accent: #f5a623;
    --accent2: #e040fb;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --green: #4ade80;
    --red: #f87171;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;

  .bg-orbs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25; }
  .orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: -50px; right: -50px; }
  .orb3 { width: 200px; height: 200px; background: #60a5fa; top: 40%; left: 60%; }

  .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 16px 60px; }

  .header { text-align: center; padding: 36px 0 24px; }
  .badge {
    display: inline-block; background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 11px; font-weight: 700; padding: 4px 14px; border-radius: 20px;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
  }
  .header h1 {
    font-size: 26px; font-weight: 900; line-height: 1.2;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header p { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .progress-wrap { margin-bottom: 20px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px; margin-bottom: 12px; }
  .q-num { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .question {
    font-size: 17px; font-weight: 700; line-height: 1.65; color: var(--text);
    padding: 16px; background: rgba(255,255,255,0.03); border-left: 3px solid var(--accent);
    border-radius: 8px; margin-bottom: 18px; word-break: break-all;
  }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    padding: 13px 16px; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 10px;
    cursor: pointer; font-size: 15px; color: var(--text);
    transition: all 0.15s; display: flex; align-items: center; gap: 12px; user-select: none;
  }
  .option:active { transform: scale(0.98); }
  .option:hover { background: rgba(245,166,35,0.08); border-color: rgba(245,166,35,0.4); }
  .option.selected { background: rgba(245,166,35,0.15); border-color: var(--accent); }
  .option.correct { background: rgba(74,222,128,0.12); border-color: var(--green); }
  .option.wrong { background: rgba(248,113,113,0.12); border-color: var(--red); }
  .opt-letter {
    width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .option.selected .opt-letter { background: var(--accent); color: #000; }
  .option.correct .opt-letter { background: var(--green); color: #000; }
  .option.wrong .opt-letter { background: var(--red); color: #fff; }

  .btn-row { display: flex; gap: 10px; margin-top: 14px; }
  .btn { flex: 1; padding: 13px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.18s; font-family: inherit; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #f0a020); color: #000; }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
  .btn-ghost { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:active { background: rgba(255,255,255,0.1); }

  .timer { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .timer.warning { color: #fbbf24; }
  .timer.danger { color: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .timer.danger span { animation: blink 0.6s infinite; }

  .nav-dots { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .nav-dot {
    width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.15s; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04); color: var(--muted);

  .nav-dot:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
  .nav-dot.current { box-shadow: 0 0 0 2px var(--accent); color: var(--accent); border-color: var(--accent); }
  .nav-dot.done-correct { background: rgba(74,222,128,0.2); border-color: rgba(74,222,128,0.5); color: var(--green); }
  .nav-dot.done-wrong { background: rgba(248,113,113,0.2); border-color: rgba(248,113,113,0.5); color: var(--red); }
  .nav-dot.unanswered { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); color: var(--muted); }

  .start-icon { font-size: 60px; text-align: center; margin-bottom: 16px; }
  .rules { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 18px; margin: 20px 0; border: 1px solid var(--border); }
  .rule-item { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13px; color: var(--muted); align-items: flex-start; line-height: 1.5; }
  .rule-item:last-child { margin-bottom: 0; }
  .rule-icon { flex-shrink: 0; margin-top: 1px; }
  .start-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, var(--accent), #f0a020); color: #000; font-family: inherit; transition: all 0.18s; }
  .start-btn:active { opacity: 0.85; transform: scale(0.98); }

  .result-card { text-align: center; padding: 32px 20px; }
  .score-ring { width: 130px; height: 130px; margin: 0 auto 20px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring circle { fill: none; stroke-width: 9; }
  .score-bg { stroke: var(--border); }
  .score-fill { stroke: url(#scoreGrad); stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
  .score-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .score-num { font-size: 34px; font-weight: 900; line-height: 1; }
  .score-label { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .result-title { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
  .result-desc { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 20px; padding: 0 8px; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .stat-box { flex: 1; padding: 14px 10px; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); }
  .stat-num { font-size: 22px; font-weight: 900; }
  .stat-num.g { color: var(--green); }
  .stat-num.r { color: var(--red); }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; }
  .restart-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, var(--accent), #f0a020); color: #000; font-family: inherit; transition: all 0.18s; }
  .restart-btn:active { opacity: 0.85; }

  .review-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; text-align: center; margin: 24px 0 14px; display: flex; align-items: center; gap: 12px; }
  .review-title::before, .review-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .review-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
  .review-q { font-size: 13px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 8px; }
  .review-q-num { color: var(--accent); font-size: 11px; flex-shrink: 0; margin-top: 2px; }
  .review-answer { font-size: 12px; color: var(--muted); padding-left: 18px; margin-bottom: 4px; }
  .review-answer strong { color: var(--green); }
  .review-user { font-size: 12px; padding-left: 18px; }
  .review-user.correct strong { color: var(--green); }
  .review-user.wrong strong { color: var(--red); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.35s ease forwards; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(20,20,30,0.95); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 9999; backdrop-filter: blur(10px); transition: opacity 0.3s; }
</style>
</head>

const TOTAL = 20;
const TOTAL_TIME = 30 * 60;
const LETTERS = ['A','B','C','D'];

let S = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}

function toast(msg, dur=2000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block'; el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.style.display='none', 300); }, dur);
}

function pickQuestions() {
  return shuffle(QUESTIONS).slice(0, TOTAL).map(q => {
    const indices = q.o.map((_, i) => i);
    const shuffledIdx = shuffle(indices);
    return {
      q: q.q,
      o: shuffledIdx.map(i => q.o[i]),
      a: shuffledIdx.indexOf(q.a)
    };
  });
}

function startQuiz() {
  S = {
    screen: 'quiz',
    qs: pickQuestions(),
    answers: new Array(TOTAL).fill(null).map(() => ({sel:null, ok:null})),
    cur: 0,
    start: Date.now(),
    elapsed: 0,
    tmr: null,
  };
  S.tmr = setInterval(() => {
    S.elapsed = Math.floor((Date.now() - S.start) / 1000);
    if (S.elapsed >= TOTAL_TIME) {
      clearInterval(S.tmr);
      showResult();
    } else {
      const el = document.getElementById('td');
      if (el) {
        const rem = TOTAL_TIME - S.elapsed;
        el.textContent = fmtTime(rem);
        const w = el.closest('.timer');
        if (w) w.className = 'timer ' + (rem < 60 ? 'danger' : rem < 300 ? 'warning' : '');
      }
    }
  }, 1000);
  render();
}

function selectOpt(idx) {
  if (S.answers[S.cur].sel !== null) return;
  S.answers[S.cur] = {sel: idx, ok: idx === S.qs[S.cur].a};
  render();
}

function goNext() {
  if (S.cur < TOTAL - 1) { S.cur++; render(); }
  else showResult();
}

function goPrev() {
  if (S.cur > 0) { S.cur--; render(); }
}

function jumpTo(i) { S.cur = i; render(); }

function submitQuiz() {
  const unanswered = S.answers.filter(a => a.sel === null).length;
  if (unanswered > 0) {
    toast('还有 ' + unanswered + ' 题未答完，确认提交？', 3000);
    return;
  }
  showResult();
}

function showResult() {
  clearInterval(S.tmr);
  S.screen = 'result';
  render();
}

function restart() { startQuiz(); }

function render() {
  const app = document.getElementById('app');
  app.innerHTML = S.screen === 'start' ? renderStart() : S.screen === 'quiz' ? renderQuiz() : renderResult();
  bind();
}

  return `<div class="fade-up">
  <div class="header">
    <div class="badge">🧠 思维挑战</div>

function renderQuiz() {
  const q = S.qs[S.cur];
  const ans = S.answers[S.cur];
  const answered = S.answers.filter(a => a.sel !== null).length;
  const pct = ((S.cur + 1) / TOTAL * 100).toFixed(0);
  const rem = TOTAL_TIME - S.elapsed;
  const tClass = rem < 60 ? 'danger' : rem < 300 ? 'warning' : '';

  let optsHtml = q.o.map((opt, i) => {
    let cls = 'option';
    if (ans.sel !== null) {
      if (i === q.a) cls += ' correct';
      else if (i === ans.sel) cls += ' wrong';
    }
    return `<div class="${cls}" data-idx="${i}"><div class="opt-letter">${LETTERS[i]}</div><span>${opt}</span></div>`;
  }).join('');

  let navHtml = S.qs.map((_, i) => {
    const a = S.answers[i];
    let cls = 'nav-dot';
    if (i === S.cur) cls += ' current';
    else if (a.sel === null) cls += ' unanswered';
    else if (a.ok) cls += ' done-correct';
    else cls += ' done-wrong';
    return `<div class="${cls}" data-j="${i}">${i+1}</div>`;
  }).join('');

  return `
  <div class="header">
    <div class="badge">🧠 脑筋急转弯</div>
    <h1>第 ${S.cur+1} / ${TOTAL} 题</h1>
    <div class="timer ${tClass}"><span>⏱</span><span id="td">${fmtTime(rem)}</span></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-info"><span>已答 ${answered}/${TOTAL}</span><span>${pct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="card">
    <div class="q-num">第 ${S.cur+1} 题</div>
    <div class="question">${q.q}</div>
    <div class="options">${optsHtml}</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-ghost" id="btn-prev" ${S.cur===0?'disabled style="opacity:0.3"':''}>← 上一题</button>
    ${S.cur === TOTAL-1
      ? `<button class="btn btn-primary" id="btn-submit">提交全部 →</button>`
      : `<button class="btn btn-primary" id="btn-next">下一题 →</button>`}
  </div>
  <div class="nav-dots">${navHtml}</div>`;
}

  else if (pct >= 30) { title = '🧠 废物'; desc = '兄弟，你还好吗？需要帮你叫救护车吗？'; }

  const reviewHtml = S.qs.map((q, i) => {

      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle class="score-bg" cx="65" cy="65" r="52"/>
        <circle class="score-fill" cx="65" cy="65" r="52" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="score-text"><div class="score-num">${pct}</div><div class="score-label">正确率</div></div>
    </div>
    <div class="result-title">${title}</div>
    <div class="result-desc">${desc}</div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num g">${correct}</div><div class="stat-label">答对</div></div>
      <div class="stat-box"><div class="stat-num r">${wrong}</div><div class="stat-label">答错</div></div>
      <div class="stat-box"><div class="stat-num">${TOTAL}</div><div class="stat-label">总题数</div></div>
    </div>
    <button class="restart-btn" id="btn-restart">🔄 再来一次</button>
  </div>
  <div class="review-title">答案回顾</div>
  ${reviewHtml}
</div>`;
}

function bind() {}

S = { screen: 'start' };
render();
</script>
</body>
</html>
